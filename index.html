<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAdashglass Pro v3.1</title>
    <link rel="stylesheet" href="style.css?v=3.0.0">
</head>
<body>
    <div class="sidebar">
        <div class="nav-icon active" data-target="page-home">🏠</div>
        <div class="nav-spacer" style="flex: 1;"></div>
        <div class="nav-icon" data-target="page-settings">⚙️</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="clock-section">
                <h2 id="time">00:00</h2>
                <div id="date">Carregando...</div>
            </div>
            
            <div class="weather-full">
                <span id="w-icon" style="font-size: 32px;">☀️</span>
                <div class="weather-info-main">
                    <div id="w-condition">--</div>
                    <div class="weather-temp-row">
                        <span id="w-temp">--</span>°C
                    </div>
                    <div class="weather-stats">
                        <span>💧 <span id="w-humidity">--</span></span>
                        <span>| 🌧️ <span id="w-rain">--</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-home" class="page active">
            <div class="filter-group">
                <div class="area-filter-bar" id="filter-home"></div>
                <div class="area-filter-bar" id="state-filter-home"></div>
            </div>
            <div class="grid" id="dashboard-grid"></div>
        </div>

        <div id="page-settings" class="page">
            <div class="settings-tabs">
                <div class="tab-btn active" data-tab="tab-lights">💡 Luzes</div>
                <div class="tab-btn" data-tab="tab-switches">🔌 Tomadas</div>
                <div class="tab-btn" data-tab="tab-system">⚙️ Sistema</div>
            </div>

            <div id="tab-lights" class="tab-content active">
                <div class="filter-group">
                    <div class="area-filter-bar" id="filter-lights"></div>
                    <div class="area-filter-bar" id="state-filter-lights"></div>
                </div>
                <div id="lights-list"></div>
            </div>

            <div id="tab-switches" class="tab-content">
                <div class="filter-group">
                    <div class="area-filter-bar" id="filter-switches"></div>
                    <div class="area-filter-bar" id="state-filter-switches"></div>
                </div>
                <div id="switches-list"></div>
            </div>

            <div id="tab-system" class="tab-content">
                <div class="list-container">
                    <div class="list-item"><span>Status do Sistema</span><span id="sys-status" style="color:#00e676">Conectado</span></div>
                    <div class="list-item"><span>Versão</span><span>v3.1.0 — 20/03/2026</span></div>
                    <div class="list-item"><span>Dispositivo</span><span>Pro (Mac / iPhone)</span></div>
                    <div class="list-item"><span>Compatibilidade</span><span style="color:#00e676">iOS 17+ / Chrome</span></div>
                    <div class="list-item"><span>ES Modules</span><span style="color:#00e676">Ativado</span></div>
                    <div class="list-item"><span>Backdrop-filter</span><span style="color:#00e676">Ativado</span></div>
                    <div class="list-item"><span>Entidades Visíveis</span><span id="sys-visible-count">--</span></div>
                    <div class="list-item"><span>Total de Entidades</span><span id="sys-total-count">--</span></div>
                    <div class="list-item"><span>Áreas Mapeadas</span><span id="sys-areas-count">--</span></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=3.0.1"></script>
</body>
</html>
