<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAdashglass P7</title>
    <link rel="stylesheet" href="style.css?v=3.0.0">
    <style>
        /* ── P7 NAV ICON ── */
        .nav-icon.nav-p7.active {
            background: rgba(100,180,255,0.18);
            color: #64b4ff;
            box-shadow: 0 0 0 1px rgba(100,180,255,0.3);
        }

        /* ── P7 PAGE — grid maior e touch-friendly ── */
        .p7-grid {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }

        .p7-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            padding: 20px 14px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 110px;
            justify-content: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .p7-card:active { transform: scale(0.96); }

        .p7-card.on {
            background: rgba(100,180,255,0.10);
            border-color: rgba(100,180,255,0.3);
            box-shadow: 0 4px 20px rgba(100,180,255,0.08);
        }

        .p7-card .p7-card-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }

        .p7-card .p7-card-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-align: center;
            line-height: 1.2;
        }

        .p7-card.on .p7-card-name { color: #64b4ff; }

        .p7-card .p7-card-area {
            font-size: 10px;
            opacity: 0.3;
            text-align: center;
        }

        .p7-state-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .p7-card.on .p7-state-dot {
            background: #64b4ff;
            box-shadow: 0 0 6px rgba(100,180,255,0.6);
        }

        /* ── DUAS ESTRELAS NA LISTA ── */
        .item-stars {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .star-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.3;
            line-height: 1;
        }

        .star-btn {
            font-size: 20px;
            cursor: pointer;
            color: rgba(255,255,255,0.18);
            line-height: 1;
            transition: color 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .star-btn:active { transform: scale(1.2); }

        .star-btn.star-p7.star-on  { color: #64b4ff; }
        .star-btn.star-home.star-on { color: #ffb400; }

        .stars-divider {
            width: 1px;
            height: 30px;
            background: rgba(255,255,255,0.07);
        }

        /* ── SISTEMA — P7 ── */
        .sys-grid-tablet {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .sys-card-tablet {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
        }

        .sys-card-tablet .sys-num { font-size: 32px; font-weight: 200; color: #ffb400; }
        .sys-card-tablet .sys-num.p7-color { color: #64b4ff; }
        .sys-card-tablet .sys-label { font-size: 12px; opacity: 0.4; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-icon active" data-target="page-home">🏠</div>
        <div class="nav-icon nav-p7" data-target="page-p7">📱</div>
        <div class="nav-spacer" style="flex: 1;"></div>
        <div class="nav-icon" data-target="page-settings">⚙️</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="clock-section">
                <h2 id="time">00:00</h2>
                <div id="date">Carregando...</div>
            </div>
            <div class="weather-full">
                <span id="w-icon" style="font-size: 32px;">☀️</span>
                <div class="weather-info-main">
                    <div id="w-condition">--</div>
                    <div class="weather-temp-row">
                        <span id="w-temp">--</span>°C
                    </div>
                    <div class="weather-stats">
                        <span>💧 <span id="w-humidity">--</span></span>
                        <span>| 🌧️ <span id="w-rain">--</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- HOME — igual ao Pro, favoritos compartilhados -->
        <div id="page-home" class="page active">
            <div class="filter-group">
                <div class="area-filter-bar" id="filter-home"></div>
                <div class="area-filter-bar" id="state-filter-home"></div>
            </div>
            <div class="grid" id="dashboard-grid"></div>
        </div>

        <!-- P7 — favoritos exclusivos do tablet -->
        <div id="page-p7" class="page">
            <div class="filter-group">
                <div class="area-filter-bar" id="filter-p7"></div>
                <div class="area-filter-bar" id="state-filter-p7"></div>
            </div>
            <div class="grid p7-grid" id="p7-grid"></div>
        </div>

        <!-- AJUSTES — abas com duas estrelas por item -->
        <div id="page-settings" class="page">
            <div class="settings-tabs">
                <div class="tab-btn active" data-tab="tab-lights">💡 Luzes</div>
                <div class="tab-btn" data-tab="tab-switches">🔌 Tomadas</div>
                <div class="tab-btn" data-tab="tab-system">⚙️ Sistema</div>
            </div>

            <div id="tab-lights" class="tab-content active">
                <div class="filter-group">
                    <div class="area-filter-bar" id="filter-lights"></div>
                    <div class="area-filter-bar" id="state-filter-lights"></div>
                </div>
                <div id="lights-list"></div>
            </div>

            <div id="tab-switches" class="tab-content">
                <div class="filter-group">
                    <div class="area-filter-bar" id="filter-switches"></div>
                    <div class="area-filter-bar" id="state-filter-switches"></div>
                </div>
                <div id="switches-list"></div>
            </div>

            <div id="tab-system" class="tab-content">
                <div class="sys-grid-tablet">
                    <div class="sys-card-tablet">
                        <div class="sys-num" id="sys-total-count">--</div>
                        <div class="sys-label">Entidades</div>
                    </div>
                    <div class="sys-card-tablet">
                        <div class="sys-num p7-color" id="sys-p7-count">--</div>
                        <div class="sys-label">Favoritos P7</div>
                    </div>
                    <div class="sys-card-tablet">
                        <div class="sys-num" id="sys-home-count">--</div>
                        <div class="sys-label">Favoritos Home</div>
                    </div>
                    <div class="sys-card-tablet">
                        <div class="sys-num" id="sys-areas-count">--</div>
                        <div class="sys-label">Áreas</div>
                    </div>
                    <div class="sys-card-tablet">
                        <div class="sys-num" id="sys-lights-on">--</div>
                        <div class="sys-label">Luzes On</div>
                    </div>
                    <div class="sys-card-tablet">
                        <div class="sys-num" id="sys-switches-on">--</div>
                        <div class="sys-label">Tomadas On</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="tablet.js?v=1.0.0"></script>
</body>
</html>
